
<style>
  @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --apple-blue: #007AFF;
    --apple-blue-dark: #0056CC;
    --apple-bg: #F2F2F7;
    --apple-card: #FFFFFF;
    --apple-separator: rgba(60,60,67,0.18);
    --apple-label: rgba(60,60,67,0.6);
    --apple-text: #1C1C1E;
    --apple-secondary-bg: #EFEFF4;
    --apple-green: #34C759;
    --apple-orange: #FF9500;
    --apple-red: #FF3B30;
    --apple-radius: 16px;
    --apple-radius-lg: 22px;
  }

  /* Programmatic theme sync classes */
  html.dark {
    --apple-bg: #000000;
    --apple-card: #1C1C1E;
    --apple-separator: rgba(84,84,88,0.6);
    --apple-label: rgba(235,235,245,0.6);
    --apple-text: #FFFFFF;
    --apple-secondary-bg: #2C2C2E;
  }
  html.light {
    --apple-bg: #F2F2F7;
    --apple-card: #FFFFFF;
    --apple-separator: rgba(60,60,67,0.18);
    --apple-label: rgba(60,60,67,0.6);
    --apple-text: #1C1C1E;
    --apple-secondary-bg: #EFEFF4;
  }

  html, body {
    overflow-x: hidden;
    scrollbar-width: none; /* Firefox */
    -ms-overflow-style: none; /* IE/Edge */
  }

  body {
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    background: var(--apple-bg);
    padding: 0;
    -webkit-font-smoothing: antialiased;
    overflow-y: auto;
  }

  /* Hide webkit scrollbar entirely */
  html::-webkit-scrollbar,
  body::-webkit-scrollbar {
    display: none;
  }

  .container {
    max-width: 520px;
    margin: 0 auto;
    padding: 32px 20px 40px;
  }

  .header {
    text-align: center;
    margin-bottom: 32px;
  }

  .header-icon {
    width: 72px;
    height: 72px;
    background: linear-gradient(145deg, #007AFF, #34AADC);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    box-shadow: 0 8px 24px rgba(0,122,255,0.35);
  }

  .header-icon svg {
    width: 36px;
    height: 36px;
    fill: white;
  }

  .card {
    background: var(--apple-card);
    border-radius: var(--apple-radius-lg);
    padding: 0;
    overflow: hidden;
    margin-bottom: 16px;
  }

  .password-display {
    padding: 28px 24px 24px;
    text-align: center;
    position: relative;
  }

  .password-label {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--apple-label);
    margin-bottom: 14px;
  }

  .password-value {
    font-family: 'Menlo', 'SF Mono', monospace;
    font-size: 19px;
    font-weight: 500;
    color: var(--apple-text);
    word-break: break-all;
    line-height: 1.55;
    min-height: 60px;
    letter-spacing: 0.5px;
    padding: 0 4px;
    transition: opacity 0.2s ease;
  }

  .password-value.fading { opacity: 0; }

  .strength-bar-row {
    display: flex;
    gap: 5px;
    margin: 16px 0 6px;
    padding: 0 4px;
  }

  .strength-seg {
    flex: 1;
    height: 4px;
    border-radius: 2px;
    background: var(--apple-secondary-bg);
    transition: background 0.35s ease;
    overflow: hidden;
  }

  .strength-seg.filled-weak { background: var(--apple-red); }
  .strength-seg.filled-fair { background: var(--apple-orange); }
  .strength-seg.filled-strong { background: #30D158; }
  .strength-seg.filled-very-strong { background: var(--apple-green); }

  .strength-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--apple-label);
    text-align: left;
    padding: 0 4px;
    margin-bottom: 4px;
  }

  .actions-row {
    display: flex;
    border-top: 0.5px solid var(--apple-separator);
  }

  .action-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    padding: 14px 8px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--apple-blue);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2px;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .action-btn:not(:last-child) {
    border-right: 0.5px solid var(--apple-separator);
  }

  .action-btn:active {
    background: var(--apple-secondary-bg);
  }

  .action-btn svg {
    width: 22px;
    height: 22px;
    stroke: var(--apple-blue);
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .copied-toast {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(6px);
    background: rgba(28,28,30,0.88);
    color: white;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 18px;
    border-radius: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    white-space: nowrap;
    backdrop-filter: blur(10px);
  }

  .copied-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .settings-card {
    background: var(--apple-card);
    border-radius: var(--apple-radius-lg);
    overflow: hidden;
    margin-bottom: 16px;
  }

  .setting-row {
    display: flex;
    align-items: center;
    padding: 14px 20px;
    gap: 14px;
  }

  .setting-row:not(:last-child) {
    border-bottom: 0.5px solid var(--apple-separator);
  }

  .setting-row.slider-row {
    flex-direction: column;
    align-items: stretch;
    gap: 10px;
  }

  .setting-icon {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .setting-icon svg {
    width: 16px;
    height: 16px;
    stroke: white;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .setting-text {
    flex: 1;
  }

  .setting-title {
    font-size: 15px;
    font-weight: 500;
    color: var(--apple-text);
    line-height: 1.3;
  }

  .setting-desc {
    font-size: 12px;
    color: var(--apple-label);
    margin-top: 2px;
  }

  .slider-header {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .slider-val {
    font-size: 17px;
    font-weight: 600;
    color: var(--apple-blue);
    min-width: 28px;
    text-align: right;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    border-radius: 2px;
    background: var(--apple-secondary-bg);
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-runnable-track {
    height: 4px;
    border-radius: 2px;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    margin-top: -10px;
    cursor: pointer;
    border: 0.5px solid rgba(0,0,0,0.1);
  }

  .apple-toggle {
    width: 50px;
    height: 30px;
    border-radius: 15px;
    background: #E5E5EA;
    position: relative;
    cursor: pointer;
    transition: background 0.25s ease;
    flex-shrink: 0;
    border: none;
    outline: none;
    -webkit-tap-highlight-color: transparent;
  }

  .apple-toggle.on { background: var(--apple-green); }

  .apple-toggle::after {
    content: '';
    position: absolute;
    top: 3px;
    left: 3px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: white;
    transition: left 0.25s ease;
    box-shadow: 0 2px 6px rgba(0,0,0,0.18);
  }

  .apple-toggle.on::after { left: 23px; }

  @media (prefers-color-scheme: dark) {
    .apple-toggle { background: #3A3A3C; }
    .apple-toggle.on { background: var(--apple-green); }
  }

  .generate-btn {
    width: 100%;
    padding: 17px;
    background: var(--apple-blue);
    color: white;
    border: none;
    border-radius: var(--apple-radius-lg);
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: -0.2px;
    transition: background 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    margin-bottom: 0;
  }

  .generate-btn:active {
    background: var(--apple-blue-dark);
    transform: scale(0.98);
  }

  .section-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--apple-label);
    padding: 0 4px 8px;
  }

  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }
</style>
<script>
  (function() {
    try {
      var p = window.parent.document.documentElement;
      if (p.classList.contains('dark')) { document.documentElement.classList.add('dark'); }
      else { document.documentElement.classList.add('light'); }
    } catch(e) { document.documentElement.classList.add('light'); }
    var lang = new URLSearchParams(window.location.search).get('lang');
    window.__initialLang = lang === 'en' ? 'en' : 'id';
  })();
</script>

<div class="container">
  <h2 class="sr-only">Generator kata sandi Apple-style</h2>

  <div class="header">
    <div class="header-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C10.3431 2 9 3.34315 9 5V7H6C4.89543 7 4 7.89543 4 9V19C4 20.1046 4.89543 21 6 21H18C19.1046 21 20 20.1046 20 19V9C20 7.89543 19.1046 7 18 7H15V5C15 3.34315 13.6569 2 12 2ZM11 5C11 4.44772 11.4477 4 12 4C12.5523 4 13 4.44772 13 5V7H11V5ZM12 12C12.5523 12 13 12.4477 13 13V15C13 15.5523 12.5523 16 12 16C11.4477 16 11 15.5523 11 15V13C11 12.4477 11.4477 12 12 12Z"/>
      </svg>
    </div>
  </div>

  <div class="card" style="position:relative;">
    <div class="password-display">
      <div class="password-label">Kata sandi Anda</div>
      <div class="password-value" id="passwordDisplay">Tekan "Buat Baru" untuk memulai</div>
      <div class="strength-bar-row" id="strengthBar">
        <div class="strength-seg" id="s1"></div>
        <div class="strength-seg" id="s2"></div>
        <div class="strength-seg" id="s3"></div>

      <div class="strength-label" id="strengthLabel"></div>
    </div>
    <div class="actions-row">
      <button class="action-btn" onclick="copyPassword()" aria-label="Salin kata sandi">
        <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Salin
      </button>
      <button class="action-btn" onclick="generatePassword()" aria-label="Buat kata sandi baru">
        <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.6"/></svg>

  <div style="margin-bottom:8px;" class="section-title">Pengaturan</div>

  <div class="settings-card">
    <div class="setting-row slider-row">

        <div class="setting-icon" style="background:#5856D6;" aria-hidden="true">
          <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>

    <div class="setting-row">
      <div class="setting-icon" style="background:#FF9500;" aria-hidden="true">
        <svg viewBox="0 0 24 24"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>

    <div class="setting-row">
      <div class="setting-icon" style="background:#007AFF;" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M4 7h11M4 12h11M4 17h7"/></svg>

        <div class="setting-title">Huruf Kecil</div>

      <button class="apple-toggle on" id="toggleLower" onclick="toggleOpt(this)" aria-label="Toggle huruf kecil" aria-checked="true" role="switch"></button>
    </div>

    <div class="setting-row">
      <div class="setting-icon" style="background:#34C759;" aria-hidden="true">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      </div>
      <div class="setting-text">
        <div class="setting-title">Angka</div>
        <div class="setting-desc">Sertakan 0–9</div>

      <button class="apple-toggle on" id="toggleNum" onclick="toggleOpt(this)" aria-label="Toggle angka" aria-checked="true" role="switch"></button>
    </div>

    <div class="setting-row">
      <div class="setting-icon" style="background:#FF3B30;" aria-hidden="true">
        <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      </div>
      <div class="setting-text">
        <div class="setting-title">Simbol</div>
        <div class="setting-desc">Sertakan !@#$%^&*</div>
      </div>
      <button class="apple-toggle on" id="toggleSym" onclick="toggleOpt(this)" aria-label="Toggle simbol" aria-checked="true" role="switch"></button>
    </div>
  </div>

  <button class="generate-btn" onclick="generatePassword()">Buat Kata Sandi Baru</button>
</div>

<script>
  let currentPassword = '';

  function getOptions() {
    return {
      length: parseInt(document.getElementById('lengthSlider').value),
      upper: document.getElementById('toggleUpper').classList.contains('on'),
      lower: document.getElementById('toggleLower').classList.contains('on'),
      num: document.getElementById('toggleNum').classList.contains('on'),
      sym: document.getElementById('toggleSym').classList.contains('on'),
    };
  }

  function buildCharset(opts) {
    let c = '';
    if (opts.upper) c += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    if (opts.lower) c += 'abcdefghijklmnopqrstuvwxyz';
    if (opts.num) c += '0123456789';
    if (opts.sym) c += '!@#$%^&*()-_=+[]{}|;:,.<>?';
    return c;
  }

  function generatePassword() {
    const opts = getOptions();
    const charset = buildCharset(opts);
    if (!charset) {
      document.getElementById('passwordDisplay').textContent = 'Pilih minimal satu opsi';
      clearStrength();
      return;
    }
    const arr = new Uint32Array(opts.length);
    crypto.getRandomValues(arr);
    let pwd = '';
    for (let i = 0; i < opts.length; i++) {
      pwd += charset[arr[i] % charset.length];
    }
    currentPassword = pwd;

    const el = document.getElementById('passwordDisplay');
    el.classList.add('fading');
    setTimeout(() => {
      el.textContent = pwd;
      el.classList.remove('fading');
      updateStrength(pwd, opts);
    }, 150);
  }

  function updateStrength(pwd, opts) {
    let score = 0;
    if (pwd.length >= 12) score++;
    if (pwd.length >= 20) score++;
    const types = [opts.upper, opts.lower, opts.num, opts.sym].filter(Boolean).length;
    score += Math.min(types - 1, 2);

    const labels = ['', 'Lemah', 'Sedang', 'Kuat', 'Sangat Kuat'];
    const classes = ['', 'filled-weak', 'filled-fair', 'filled-strong', 'filled-very-strong'];
    const filled = Math.max(1, Math.min(score, 4));

    for (let i = 1; i <= 4; i++) {
      const seg = document.getElementById('s' + i);
      seg.className = 'strength-seg';
      if (i <= filled) seg.classList.add(classes[filled]);
    }
    document.getElementById('strengthLabel').textContent = labels[filled];
  }

  function clearStrength() {
    for (let i = 1; i <= 4; i++) {
      document.getElementById('s' + i).className = 'strength-seg';
    }
    document.getElementById('strengthLabel').textContent = '';
  }

  function updateLength(val) {
    document.getElementById('lengthVal').textContent = val;
    const slider = document.getElementById('lengthSlider');
    const pct = ((val - slider.min) / (slider.max - slider.min)) * 100;
    slider.style.background = `linear-gradient(to right, #007AFF ${pct}%, var(--apple-secondary-bg) ${pct}%)`;
  }

  function toggleOpt(btn) {
    btn.classList.toggle('on');
    const isOn = btn.classList.contains('on');
    btn.setAttribute('aria-checked', isOn);
  }

  async function copyPassword() {
    if (!currentPassword) return;
    try {
      await navigator.clipboard.writeText(currentPassword);
    } catch(e) {
      const ta = document.createElement('textarea');
      ta.value = currentPassword;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2200);
  }

  // Programmatic theme sync from parent
  window.syncTheme = function(dark) {
    const htmlEl = document.documentElement;
    htmlEl.classList.toggle('dark', !!dark);
    htmlEl.classList.toggle('light', !dark);
    updateLength(document.getElementById('lengthSlider').value);
  }

  updateLength(16);
  generatePassword();

  // ===== Language Sync from Parent Dashboard =====
  const toolTranslations = {
    id: {
      passwordLabel:'Kata sandi Anda',
      placeholder:  'Tekan "Buat Baru" untuk memulai',
      copyBtn:      'Salin',
      generateBtn:  'Buat Baru',
      generateBig:  'Buat Kata Sandi Baru',
      toastCopied:  '✓ Disalin ke clipboard',
      sectionTitle: 'Pengaturan',
      lengthTitle:  'Panjang Kata Sandi',
      upperTitle:   'Huruf Kapital',
      upperDesc:    'Sertakan A–Z',
      lowerTitle:   'Huruf Kecil',
      lowerDesc:    'Sertakan a–z',
      numTitle:     'Angka',
      numDesc:      'Sertakan 0–9',
      symTitle:     'Simbol',
      symDesc:      'Sertakan !@#$%^&*',
      noOption:     'Pilih minimal satu opsi',
      strengthLabels: ['', 'Lemah', 'Sedang', 'Kuat', 'Sangat Kuat'],
    },
    en: {
      passwordLabel:'Your password',
      placeholder:  'Tap "Generate" to get started',
      copyBtn:      'Copy',
      generateBtn:  'Generate',
      generateBig:  'Generate New Password',
      toastCopied:  '✓ Copied to clipboard',
      sectionTitle: 'Settings',
      lengthTitle:  'Password Length',
      upperTitle:   'Uppercase Letters',
      upperDesc:    'Include A–Z',
      lowerTitle:   'Lowercase Letters',
      lowerDesc:    'Include a–z',
      numTitle:     'Numbers',
      numDesc:      'Include 0–9',
      symTitle:     'Symbols',
      symDesc:      'Include !@#$%^&*',
      noOption:     'Select at least one option',
      strengthLabels: ['', 'Weak', 'Fair', 'Strong', 'Very Strong'],
    }
  };

  let currentLang = 'id';

  window.syncLang = function(lang) {
    if (!toolTranslations[lang]) return;
    currentLang = lang;
    const t = toolTranslations[lang];

    // Password label & placeholder
    const lbl = document.querySelector('.password-label');
    if (lbl) lbl.textContent = t.passwordLabel;
    const display = document.getElementById('passwordDisplay');
    if (display && !currentPassword) display.textContent = t.placeholder;

    // Buttons
    const copyBtn = document.querySelector('.action-btn[onclick="copyPassword()"]');
    if (copyBtn) copyBtn.lastChild.textContent = ' ' + t.copyBtn;
    const genBtn = document.querySelector('.action-btn[onclick="generatePassword()"]');
    if (genBtn) genBtn.lastChild.textContent = ' ' + t.generateBtn;
    const genBig = document.querySelector('.generate-btn');
    if (genBig) genBig.textContent = t.generateBig;

    // Toast
    const toast = document.getElementById('toast');
    if (toast) toast.textContent = t.toastCopied;

    // Section title
    const secTitle = document.querySelector('.section-title');
    if (secTitle) secTitle.textContent = t.sectionTitle;

    // Setting labels
    const settingTitles = document.querySelectorAll('.setting-title');
    const settingDescs  = document.querySelectorAll('.setting-desc');
    const titleKeys = ['lengthTitle','upperTitle','lowerTitle','numTitle','symTitle'];
    const descKeys  = ['upperDesc','lowerDesc','numDesc','symDesc'];
    titleKeys.forEach((key, i) => { if (settingTitles[i]) settingTitles[i].textContent = t[key]; });
    descKeys.forEach((key, i)  => { if (settingDescs[i])  settingDescs[i].textContent  = t[key]; });

    // Strength labels — patch updateStrength to use current lang
    window._strengthLabels = t.strengthLabels;
    const curLabel = document.getElementById('strengthLabel');
    if (curLabel && curLabel.textContent) {
      const oldLabels = toolTranslations[lang === 'id' ? 'en' : 'id'].strengthLabels;
      const idx = oldLabels.indexOf(curLabel.textContent);
      if (idx > 0) curLabel.textContent = t.strengthLabels[idx];
    }
  };

  // Patch updateStrength to use dynamic labels
  const _origUpdateStrength = updateStrength;
  function updateStrength(pwd, opts) {
    let score = 0;
    if (pwd.length >= 12) score++;
    if (pwd.length >= 20) score++;
    const types = [opts.upper, opts.lower, opts.num, opts.sym].filter(Boolean).length;
    score += Math.min(types - 1, 2);
    const labels = window._strengthLabels || toolTranslations[currentLang].strengthLabels;
    const classes = ['', 'filled-weak', 'filled-fair', 'filled-strong', 'filled-very-strong'];
    const filled = Math.max(1, Math.min(score, 4));
    for (let i = 1; i <= 4; i++) {
      const seg = document.getElementById('s' + i);
      seg.className = 'strength-seg';
      if (i <= filled) seg.classList.add(classes[filled]);
    }
    document.getElementById('strengthLabel').textContent = labels[filled];
  }
  // Listen for postMessage from parent dashboard
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'syncTheme' && typeof window.syncTheme === 'function') {
      window.syncTheme(e.data.dark);
    }
    if (e.data && e.data.type === 'syncLang' && typeof window.syncLang === 'function') {
      window.syncLang(e.data.lang);
    }
  });
  if (window.__initialLang) syncLang(window.__initialLang);
</script>
