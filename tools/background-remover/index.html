<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Background Remover</title>
  <link rel="stylesheet" href="style.css">
  <link rel="modulepreload" href="https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.7.0/+esm">
  <script src="script.js"></script>
</head>
<body>
  <div class="app" id="app">
    <div class="container">
      <div class="header" aria-hidden="true">
        <div class="header-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="6" cy="6" r="3"></circle>
            <circle cx="6" cy="18" r="3"></circle>
            <line x1="20" y1="4" x2="8.12" y2="15.88"></line>
            <line x1="14.47" y1="14.48" x2="20" y2="20"></line>
            <line x1="8.12" y1="8.12" x2="12" y2="12"></line>
          </svg>
        </div>
      </div>

      <div class="section-title" id="secPickFile">Pilih Gambar</div>
      <div class="drop" id="drop" onclick="document.getElementById('fi').click()">
        <input type="file" id="fi" accept="image/*" style="display:none">
        <div class="drop-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3v4a1 1 0 0 0 1 1h4"/>
            <path d="M18 17h-7a2 2 0 0 1 -2 -2v-10a2 2 0 0 1 2 -2h4l5 5v7a2 2 0 0 1 -2 2z"/>
            <path d="M16 17v2a2 2 0 0 1 -2 2h-7a2 2 0 0 1 -2 -2v-10a2 2 0 0 1 2 -2h2"/>
          </svg>
        </div>
        <div class="drop-t" id="lblDropTitle">Seret & lepas gambar di sini</div>
        <div class="drop-s" id="lblDropSub">Mendukung format JPG, PNG, WEBP, dan lainnya</div>
      </div>

      <!-- Progress Section -->
      <div id="progressSection" class="progress-card" style="display:none">
        <div class="zinfo" id="statusLabel">Menyiapkan model AI...</div>
        <div class="prog-w">
          <div class="prog-f" id="progressBar" style="width:0%"></div>
        </div>
      </div>

      <!-- Preview Section -->
      <div class="section-title" id="secPreview">Pratinjau Hasil</div>
      <div class="card">
        <div class="cmp" id="cmpContainer">
          <div class="cmp-empty" id="cmpEmpty">Pilih gambar untuk memproses dan melihat hasil</div>
          <div id="cmpImages" style="display:none">
            <img id="cmpOriginal" alt="Original">
            <!-- Output container has transparent checkerboard background -->
            <div class="cmp-after" id="cmpAfter">
              <div class="checkerboard-bg" id="bgOverlay"></div>
              <img id="cmpResult" alt="No Background">
            </div>
            <div class="cmp-handle" id="cmpHandle">
              <div class="cmp-handle-knob">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M7 8l-4 4l4 4"/><path d="M17 8l4 4l-4 4"/><path d="M3 12l18 0"/>
                </svg>
              </div>
            </div>
            <div class="cmp-labels" id="cmpLabels">
              <span>Asli</span>
              <span>Bersih</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Background Changer Options -->
      <div class="section-title" id="bgOptionsTitle" style="display:none">Kustomisasi Latar Belakang</div>
      <div class="settings-card" id="bgOptionsCard" style="display:none">
        <div class="setting-row">
          <div class="setting-icon" style="background:#5856D6">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><path d="M12 2a7 7 0 1 0 10 10"/>
            </svg>
          </div>
          <div class="setting-text">
            <div class="setting-title" id="lblBgColor">Warna Latar</div>
            <div class="setting-desc" id="lblBgColorDesc">Ganti warna latar hasil potongan</div>
          </div>
          <div class="color-options">
            <button class="color-btn active" data-color="transparent" title="Transparan" style="background: linear-gradient(45deg, #ccc 25%, transparent 25%), linear-gradient(-45deg, #ccc 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #ccc 75%), linear-gradient(-45deg, transparent 75%, #ccc 75%); background-size: 8px 8px; background-position: 0 0, 0 4px, 4px -4px, -4px 0;"></button>
            <button class="color-btn" data-color="#FFFFFF" title="Putih" style="background: #FFFFFF; border: 0.5px solid #ccc;"></button>
            <button class="color-btn" data-color="#000000" title="Hitam" style="background: #000000;"></button>
            <button class="color-btn" data-color="#007AFF" title="Biru" style="background: #007AFF;"></button>
            <button class="color-btn" data-color="#34C759" title="Hijau" style="background: #34C759;"></button>
            <button class="color-btn" data-color="#FF9500" title="Oranye" style="background: #FF9500;"></button>
            <button class="color-btn" data-color="#FF3B30" title="Merah" style="background: #FF3B30;"></button>
            <input type="color" id="customColorPicker" title="Warna Kustom" value="#007AFF" style="width: 24px; height: 24px; border: none; padding: 0; cursor: pointer; border-radius: 50%;">
          </div>
        </div>
      </div>

      <!-- Action Buttons -->
      <button class="btn-p" id="downloadBtn" onclick="downloadResult()" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg> <span id="lblDownloadBtn">Unduh PNG Transparan</span>
      </button>

      <div style="display:grid;grid-template-columns:1fr;gap:8px;margin-top:8px">
        <button class="btn-s" id="resetBtn" onclick="resetAll()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 11a8.1 8.1 0 0 0 -15.5 -2m-.5 -4v4h4"/><path d="M4 13a8.1 8.1 0 0 0 15.5 2m.5 4v-4h-4"/></svg> <span id="lblResetBtn">Hapus Gambar</span></button>
      </div>

      <div class="alert" id="alertBox"></div>
    </div>
  </div>
</body>
</html>
