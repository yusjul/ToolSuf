<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gambar ke PDF</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container" id="app">
    <!-- Header -->
    <div class="header">
      <div class="header-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <rect x="3" y="11" width="18" height="10" rx="1"/>
          <circle cx="8.5" cy="15" r="1.5"/>
          <polyline points="21 19 16 14 11 19"/>
        </svg>
      </div>
    </div>

    <!-- Drop Zone -->
    <section class="mac-section">
      <div class="mac-section-header">PILIH GAMBAR</div>
      <div class="drop" id="drop">
        <input type="file" id="fi" multiple accept="image/*" style="display:none">
        <div class="drop-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </div>
        <div class="drop-t">Pilih gambar untuk dijadikan PDF</div>
        <div class="drop-s">Seret & lepas atau klik untuk memilih</div>
        <div class="badges">
          <span class="badge">JPG PNG</span>
          <span class="badge">WEBP GIF</span>
          <span class="badge">BMP AVIF</span>
          <span class="badge">+ Format lain</span>
        </div>
      </div>
    </section>

    <!-- Image Preview Grid -->
    <section class="mac-section" id="previewSection" style="display:none">
      <div class="mac-section-header">
        URUTAN HALAMAN
        <span id="imgCount" class="count-badge"></span>
      </div>
      <div class="preview-grid" id="previewGrid"></div>
      <div class="preview-hint">Seret kartu untuk mengubah urutan halaman</div>
    </section>

    <!-- Settings -->
    <section class="mac-section">
      <div class="mac-section-header">PENGATURAN PDF</div>
      <div class="settings-group">
        <div class="setting-row">
          <div class="setting-icon" style="background:#007AFF">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <line x1="3" y1="9" x2="21" y2="9"/>
            </svg>
          </div>
          <div class="setting-text">
            <div class="setting-title">Ukuran Halaman</div>
          </div>
          <select class="apple-select" id="pageSize">
            <option value="a4">A4 (210×297mm)</option>
            <option value="letter">Letter (216×279mm)</option>
            <option value="a3">A3 (297×420mm)</option>
            <option value="fit">Sesuai Gambar</option>
          </select>
        </div>
        <div class="setting-row">
          <div class="setting-icon" style="background:#007AFF">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="5" y="2" width="14" height="20" rx="2"/>
              <line x1="9" y1="7" x2="15" y2="7"/>
              <line x1="9" y1="11" x2="15" y2="11"/>
              <line x1="9" y1="15" x2="12" y2="15"/>
            </svg>
          </div>
          <div class="setting-text">
            <div class="setting-title">Orientasi</div>
          </div>
          <select class="apple-select" id="orientation">
            <option value="p">Portrait</option>
            <option value="l">Landscape</option>
          </select>
        </div>
        <div class="setting-row">
          <div class="setting-icon" style="background:#007AFF">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
            </svg>
          </div>
          <div class="setting-text">
            <div class="setting-title">Kualitas Gambar</div>
            <div class="setting-desc" id="qualLabel">90%</div>
          </div>
          <input type="range" id="quality" min="40" max="100" value="90"
            oninput="document.getElementById('qualLabel').textContent=this.value+'%'"
            style="width:100px;flex-shrink:0">
        </div>
        <div class="setting-row">
          <div class="setting-icon" style="background:#007AFF">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/>
              <line x1="4" y1="22" x2="4" y2="15"/>
            </svg>
          </div>
          <div class="setting-text">
            <div class="setting-title">Margin Halaman</div>
          </div>
          <select class="apple-select" id="margin">
            <option value="0">Tanpa Margin</option>
            <option value="10" selected>Kecil (10mm)</option>
            <option value="20">Normal (20mm)</option>
            <option value="30">Lebar (30mm)</option>
          </select>
        </div>
      </div>
    </section>

    <!-- Action Buttons -->
    <button class="btn-p" id="genBtn" onclick="generatePDF()" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="12" y1="18" x2="12" y2="12"/>
        <line x1="9" y1="15" x2="15" y2="15"/>
      </svg>
      Buat PDF
    </button>

    <button class="btn-s" style="margin-top:8px" onclick="clearAll()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
      </svg>
      Hapus Semua
    </button>

    <!-- Progress -->
    <div class="progress-card" id="progressCard" style="display:none">
      <div class="zinfo" id="progressText">Memproses...</div>
      <div class="prog-w"><div class="prog-f" id="pf"></div></div>
    </div>

    <div class="alert" id="alertBox"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
